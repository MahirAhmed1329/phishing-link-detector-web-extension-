    <div class="header-text">
      <h1>PhisShield</h1>
      <p>malicious url scanner v2.0</p>
    </div>
    <span class="mode-pill" id="modePill">offline</span>
  </div>

  <!-- ── Manual URL Scanner ── -->
  <div class="card">
    <div class="card-label">🔍 Manual URL Scanner</div>
    <label for="scanUrlInput">Paste a URL to analyse</label>
    <div class="input-wrap">
      <input id="scanUrlInput" type="url"
             placeholder="https://suspicious-site.com/login"
             autocomplete="off" spellcheck="false"/>
      <button class="clear-btn" id="clearInputBtn" title="Clear">×</button>
    </div>
    <button id="scanButton" class="btn-scan" type="button">
      <span id="scanBtnIcon">⚡</span>
      <span id="scanBtnText">Scan URL</span>
    </button>

    <!-- Result -->
    <div class="scan-result" id="scanResult">
      <div class="result-card">
        <div class="result-top">
          <div class="chart-wrap">
            <canvas id="resultCanvas" class="chart-canvas" width="72" height="72"></canvas>
            <div class="chart-overlay">
              <span class="chart-score" id="chartScore">50</span>
              <span class="chart-unit">/100</span>
            </div>
          </div>
          <div class="verdict-info">
            <div class="verdict-badge unknown" id="verdictBadge">
              <span class="verdict-dot"></span>
              <span id="verdictText">Unknown</span>
            </div>
            <div class="engine-row" id="engineRow">
              <span class="engine-chip mal"  id="chipMal">0 mal</span>
              <span class="engine-chip susp" id="chipSusp">0 susp</span>
              <span class="engine-chip safe" id="chipSafe">0 safe</span>
            </div>
          </div>
        </div>
        <p class="result-summary" id="resultSummary">Scanning…</p>
        <a class="result-report-link hidden" id="resultLink"
           href="#" target="_blank" rel="noopener noreferrer">
          ↗ Open VirusTotal report
        </a>
      </div>
    </div>
  </div>

  <!-- ── Settings ── -->
  <div class="card">
    <div class="card-label">⚙️ Backend Settings</div>
    <label for="backendBaseUrl">Backend base URL</label>
    <div class="input-wrap">
      <input id="backendBaseUrl" type="url" placeholder="http://localhost:3000"/>
    </div>
    <div class="actions">
      <button id="saveButton"       class="btn-primary"   type="button">Save</button>
      <button id="testButton"       class="btn-secondary" type="button">Test backend</button>
    </div>
    <div class="actions" style="margin-top:7px;">
      <button id="clearCacheButton" class="btn-secondary btn-full" type="button">
        Clear cached verdicts
      </button>
    </div>
    <div class="status-line" id="statusLine" aria-live="polite"></div>
  </div>

  <!-- ── Runtime stats ── -->
  <div class="card" style="padding:11px 13px;">
    <div class="card-label">📊 Session Stats</div>
    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-value" id="statScans">—</span>
        <span class="stat-label">scans</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statHits">—</span>
        <span class="stat-label">cached</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statErrors">—</span>
        <span class="stat-label">errors</span>
      </div>
    </div>
  </div>

  <div class="popup-footer">phisshield v2.0 · powered by virustotal</div>
</div>
